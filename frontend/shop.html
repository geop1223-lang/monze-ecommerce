<!DOCTYPE html>
<html>
<head>
    <title>Shop</title>
</head>
<body>

<h1>My Shop</h1>

<button onclick="logout()">Logout</button>

<h2>Products</h2>
<div id="products"></div>

<h2>Cart</h2>
<div id="cart"></div>

<h2>Orders</h2>
<div id="orders"></div>

<script>

const API = "http://localhost:3000";
const user = localStorage.getItem("user");

/* =========================
   PROTECT PAGE
========================= */
if (!user) {
    window.location.href = "index.html";
}

/* =========================
   LOAD PRODUCTS
========================= */
async function loadProducts() {

    const res = await fetch(API + "/products");
    const data = await res.json();

    const box = document.getElementById("products");
    box.innerHTML = "";

    data.forEach(p => {
        box.innerHTML += `
            <div>
                <p>${p.name} - K${p.price}</p>
                <button onclick="addToCart('${p._id}')">Add to Cart</button>
            </div>
        `;
    });
}

/* =========================
   ADD TO CART
========================= */
async function addToCart(productId) {

    await fetch(API + "/cart/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user,
            productId,
            quantity: 1
        })
    });

    loadCart();
}

/* =========================
   LOAD CART
========================= */
async function loadCart() {

    const res = await fetch(API + "/cart/" + user);
    const data = await res.json();

    const box = document.getElementById("cart");
    box.innerHTML = "";

    if (!data || data.length === 0) {
        box.innerHTML = "<p>Cart is empty</p>";
        return;
    }

    data.forEach(item => {
        box.innerHTML += `
            <p>${item.productId} x ${item.quantity}</p>
        `;
    });
}

/* =========================
   PLACE ORDER
========================= */
async function checkout() {

    const res = await fetch(API + "/cart/" + user);
    const cart = await res.json();

    if (!cart || cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    await fetch(API + "/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: user,
            items: cart
        })
    });

    alert("Order placed!");

    loadCart();
    loadOrders();
}

/* =========================
   LOAD ORDERS
========================= */
async function loadOrders() {

    const res = await fetch(API + "/orders/" + user);
    const data = await res.json();

    const box = document.getElementById("orders");
    box.innerHTML = "";

    if (!data || data.length === 0) {
        box.innerHTML = "<p>No orders yet</p>";
        return;
    }

    data.forEach(o => {
        box.innerHTML += `
            <div>
                <p>Order ID: ${o._id}</p>
                <p>Date: ${o.date}</p>
                <p>Items: ${o.items.length}</p>
            </div>
        `;
    });
}

/* =========================
   LOGOUT
========================= */
function logout() {
    localStorage.removeItem("user");
    window.location.href = "index.html";
}

/* =========================
   INIT PAGE
========================= */
loadProducts();
loadCart();
loadOrders();

</script>

<button onclick="checkout()">Checkout</button>

</body>
</html>
